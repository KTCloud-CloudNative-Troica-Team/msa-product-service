# Base 설정. 환경별 application-{dev,prod}.yaml이 덮어쓴다.
spring:
  application:
    name: product-service

  datasource:
    url: jdbc:postgresql://${PRODUCT_DB_HOST:localhost}:${PRODUCT_DB_PORT:7001}/${PRODUCT_DB_NAME:product_db}
    username: ${PRODUCT_DB_USERNAME:product-service}
    password: ${PRODUCT_DB_PASSWORD:product-service}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: ${JPA_SHOW_SQL:false}

server:
  port: ${SERVER_PORT:8001}

grpc:
  server:
    port: ${GRPC_SERVER_PORT:9001}

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health, info, prometheus
      path-mapping:
        health: healthz
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
